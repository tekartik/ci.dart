name: tekartik_ci
description: Tekartik CI helpers for dart
version: 0.1.0
publish_to: none
# homepage: https://www.example.com
#

environment:
  sdk: ^3.12.0

dependencies:
  meta: ">=1.18.0"
  path: ">=1.9.1"
  process_run: ">=1.2.1+1"
  dev_build: ">=1.1.7+3"
  io:
  pub_semver: ">=2.2.0"
  tekartik_platform_io:
    git:
      url: https://github.com/tekartik/platform.dart
      path: platform_io
dev_dependencies:
  lints: ">=6.1.0"
  tekartik_lints:
    git:
      url: https://github.com/tekartik/common.dart
      path: packages/lints
  test: ">=1.31.0"
executables:
  setup_sqlite3lib:
  setup_portaudiolib:
resolution: workspace
